<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Access Example</title>
</head>
<body>
    <h1 id="main-title">Hello DOM</h1>
    <p class="intro">This is an introductory paragraph.</p>
    <p class="intro">Another intro paragraph.</p>
    <ul>
        <li>Item 1</li>
        <li class="special">Item 2</li>
        <li>Item 3</li>
    </ul>
    <button>Click Me</button>

    <script>
        const mainTitle = document.getElementById("main-title");
        console.log("Element by ID:", mainTitle.textContent);

        const introParagraphs = document.getElementsByClassName("intro");
        console.log("Elements by Class Name (first):", introParagraphs[0].textContent);
        console.log("Elements by Class Name (all):", introParagraphs);

        const allListItems = document.getElementsByTagName("li");
        console.log("Elements by Tag Name (second):", allListItems[1].textContent);
        console.log("Elements by Tag Name (all):", allListItems);

        const firstParagraph = document.querySelector("p");
        console.log("First P element:", firstParagraph.textContent);

        const allSpecialItems = document.querySelectorAll("ul .special");
        console.log("All Special Items:", allSpecialItems[0].textContent);
        console.log("All Special Items (NodeList):", allSpecialItems);

        const buttonElement = document.querySelector("button");
        console.log("Button text:", buttonElement.textContent);
    </script>
</body>
</html>
